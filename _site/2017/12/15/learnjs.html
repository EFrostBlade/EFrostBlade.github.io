<!DOCTYPE html>
<html>

	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<title>学习js</title>
</head>
<body>
	<script>
	var d=new Date();
	document.write(d);
</script>
<button type="button" onclick="alert('欢迎')">点我弹出欢迎</button>
<p id="text">这里的文字将会被改变</p>
<script type="text/javascript">
	function ChangeText() {
		x=document.getElementById("text");
		x.innerHTML="哈哈，这里的文字被改变了";
	}
	function ChangeColor() {
		x=document.getElementById("text")
		x.style.color="#66CCFF";
	}
	function Number() {
		var x=document.getElementById("number").value;
		if(x==""||isNAN(x))
		{
			alert("不是数字");
		}
	}
</script>
<button type="button" onclick="ChangeText()">点击这里以改变上面文字的内容</button>
<button type="button" onclick="ChangeColor()">点击这里以改变上面文字的颜色</button>
<p>请输入数字。如果输入的不是数字，会弹出提示。</p>
<input type="text" id="number">
<button type="button" onclick="Number()">点击这里判断输入的是否为数字</button>
</body>
</html>
