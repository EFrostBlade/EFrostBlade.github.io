<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<title>学习js</title>
</head>
<body>
	<script>
	var d=new Date();
	document.write(d);
</script>
<button type="button" onclick="alert('欢迎')">点我弹出欢迎</button>
<p id="text">这里的文字将会被改变</p>
<script type="text/javascript">
	function ChangeText() {
		x=document.getElementById("text");
		x.innerHTML="哈哈，这里的文字被改变了";
	}
</script>
<button type="button" onclick="ChangeText()">点击这里以改变上面的文字</button>
</body>
</html>
